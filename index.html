<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SintagmaFilms é uma produtora audiovisual em Londrina, especializada em conteúdo para campanhas políticas, comunicação pública e presença digital." />
    <meta name="keywords" content="produtora audiovisual, londrina, vídeos, campanhas políticas, comunicação pública, produção de vídeo" />
    <title>SintagmaFilms | Produtora Audiovisual em Londrina</title>
    
    <!-- Otimização de CDN (Preconnect & DNS-Prefetch) -->
    <!-- Google Fonts CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    
    <!-- YouTube CDN (Vídeos e Thumbnails) -->
    <link rel="preconnect" href="https://www.youtube.com" />
    <link rel="preconnect" href="https://i.ytimg.com" />
    <link rel="dns-prefetch" href="https://www.youtube.com" />
    <link rel="dns-prefetch" href="https://i.ytimg.com" />
    
    <!-- API Proxy CDN -->
    <link rel="preconnect" href="https://api.rss2json.com" />
    <link rel="dns-prefetch" href="https://api.rss2json.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
